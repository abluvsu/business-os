name: Documentation & ADR Validation

on:
  push:
    branches: [main, develop]
    paths:
      - "**/*.md"
      - "templates/ADR_TEMPLATE.md"
      - "company/DECISIONS.md"
      - "company/COMPANY_CONTEXT.md"
      - "spec.md"
  pull_request:
    branches: [main, develop]
    paths:
      - "**/*.md"
      - "templates/ADR_TEMPLATE.md"
      - "company/DECISIONS.md"
      - "company/COMPANY_CONTEXT.md"
      - "spec.md"

jobs:
  validate-documentation:
    name: Validate Documentation Standards
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed for commit history checks

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate ADRs
        run: node scripts/validate-adrs.mjs

      - name: Check documentation freshness
        run: node scripts/check-docs-freshness.mjs

      - name: Verify Company Context consistency
        run: node scripts/verify-context.mjs

      - name: Check for uncommitted changes in generated files
        run: |
          if ! git diff --quiet; then
            echo "::error::Uncommitted changes detected after validation. Run validation locally and commit changes."
            git status
            exit 1
          fi

  enforce-conventional-commits:
    name: Enforce Conventional Commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate commit messages
        run: |
          # Get commits in PR range
          BASE_SHA=${{ github.event.pull_request.base.sha }}
          HEAD_SHA=${{ github.event.pull_request.head.sha }}

          # Check each commit message
          for sha in $(git log --format=%H $BASE_SHA..$HEAD_SHA); do
            msg=$(git log --format=%B -n 1 $sha)
            echo "Checking commit: $sha"
            echo "$msg" | head -1
            
            # Validate with commitlint
            echo "$msg" | npx @commitlint/cli --config commitlint.config.js
            
            if [ $? -ne 0 ]; then
              echo "::error::Commit $sha has invalid message format"
              echo "Message: $msg"
              echo "Must follow conventional commits: type(scope): description"
              echo "Allowed types: feat, fix, docs, style, refactor, perf, test, chore, revert, adr, decision, sprint"
              exit 1
            fi
          done

  require-adr-for-decisions:
    name: Require ADR for Architectural Decisions
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for ADR requirement
        run: |
          BASE_SHA=${{ github.event.pull_request.base.sha }}
          HEAD_SHA=${{ github.event.pull_request.head.sha }}

          # Files that typically require ADR
          DECISION_FILES=(
            "packages/*/package.json"
            "tsconfig.json"
            ".github/workflows/*.yml"
            "pnpm-workspace.yaml"
            "docker-compose.yml"
            "Dockerfile*"
            "apps/*/Dockerfile*"
          )

          # Check if any decision files changed
          CHANGED_FILES=$(git diff --name-only $BASE_SHA..$HEAD_SHA)
          NEEDS_ADR=false

          for file in $CHANGED_FILES; do
            for pattern in "${DECISION_FILES[@]}"; do
              if [[ $file == $pattern ]]; then
                echo "Decision-impacting file changed: $file"
                NEEDS_ADR=true
              fi
            done
          done

          if [ "$NEEDS_ADR" = true ]; then
            # Check if ADR was added/modified
            ADR_CHANGED=$(git diff --name-only $BASE_SHA..$HEAD_SHA | grep -E '(ADR-\d+|DECISIONS\.md)' || true)
            
            if [ -z "$ADR_CHANGED" ]; then
              echo "::error::This PR changes architectural/engineering decisions but no ADR was added/updated."
              echo "Please add an ADR following templates/ADR_TEMPLATE.md and update company/DECISIONS.md"
              echo "Files that trigger this check: package.json, tsconfig, workflows, docker files, workspace config"
              exit 1
            else
              echo "✅ ADR found for decision changes: $ADR_CHANGED"
            fi
          else
            echo "✅ No architectural decision files changed - ADR not required"
          fi

  typecheck-and-build:
    name: TypeCheck & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeCheck all packages
        run: pnpm typecheck

      - name: Build all packages
        run: pnpm build

  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Lint markdown files
        run: |
          markdownlint \
            --config .markdownlint.json \
            '**/*.md' \
            --ignore node_modules \
            --ignore .git \
            --ignore .next \
            --ignore dist

  check-documentation-coverage:
    name: Documentation Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify critical docs exist
        run: |
          CRITICAL_DOCS=(
            "company/COMPANY_MANIFEST.md"
            "company/COMPANY_CONTEXT.md"
            "company/DECISIONS.md"
            "spec.md"
            "templates/ADR_TEMPLATE.md"
            "docs/architecture/DOMAIN_MODEL.md"
            "docs/architecture/TRUST_PIPELINE.md"
            "docs/architecture/ARCHITECTURE_AUDIT.md"
          )

          MISSING=0
          for doc in "${CRITICAL_DOCS[@]}"; do
            if [ ! -f "$doc" ]; then
              echo "::error::Missing critical document: $doc"
              MISSING=1
            else
              echo "✅ $doc exists"
            fi
          done

          if [ $MISSING -eq 1 ]; then
            exit 1
          fi

      - name: Verify marketing docs exist
        run: |
          MARKETING_DOCS=(
            "marketing/01_customer/ICP.md"
            "marketing/01_customer/CUSTOMER_PROBLEMS.md"
            "marketing/02_product_marketing/POSITIONING.md"
            "marketing/02_product_marketing/VALUE_PROPOSITION.md"
            "marketing/03_copywriting/MESSAGING.md"
            "marketing/00_brand/BRAND_FOUNDATION.md"
          )

          MISSING=0
          for doc in "${MARKETING_DOCS[@]}"; do
            if [ ! -f "$doc" ]; then
              echo "::warning::Missing marketing document: $doc"
              MISSING=1
            fi
          done

          if [ $MISSING -eq 0 ]; then
            echo "✅ All core marketing documents present"
          fi
